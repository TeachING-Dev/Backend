spring.application.name=backend
spring.profiles.active=local

# DB 이름을 teaching_backend 로 새로 잡음 (기존 teaching DB 와 스키마가 달라 충돌 방지)
# createDatabaseIfNotExist=true 라서 없으면 자동 생성됨
spring.datasource.url=jdbc:mysql://localhost:3306/teaching_backend?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
# 실제 비밀번호는 파일에 박지 않고 환경변수로 받음. 없으면 기본값(root / 1234) 사용
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace
