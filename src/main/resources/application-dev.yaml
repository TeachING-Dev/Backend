spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:teaching}?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  token:
    secretKey: ${JWT_SECRET_KEY}
    expiration:
      access: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
      refresh: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}
app:
  oauth2:
    redirect-uri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:8080/oauth2/redirect}


cookie:
  secure: false

support:
  kakao-channel-url: ${SUPPORT_KAKAO_CHANNEL_URL:https://pf.kakao.com/_teaching}
  email: ${SUPPORT_EMAIL:support@teaching.com}

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  chat-model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}

qdrant:
  url: ${QDRANT_URL:http://localhost:6333}
  api-key: ${QDRANT_API_KEY}
  collection-name: ${QDRANT_COLLECTION_NAME:material_chunks}
  vector-size: ${QDRANT_VECTOR_SIZE:1536}

rag:
  top-k: ${RAG_TOP_K:5}
  # text-embedding-3-small 기준 실측: 관련 질문-청크 쌍 0.558, 무관한 질문 0.085 (2026-07-16 실측)
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.3}